<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title> MALW4RE//</title>

<style>
  body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    font-family: 'Courier New', monospace;

    background:
      linear-gradient(rgba(20, 15, 10, 0.88), rgba(20, 15, 10, 0.88)),
      url("https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1200&auto=format&fit=crop");

    background-size: cover;
    background-position: center;
  }

  .game-box {
    display: flex;
    justify-content: center;
    align-items: center;

    width: 98vw;
    max-width: 980px;

    padding: 18px;

    background: rgba(32, 24, 18, 0.92);

    border: 4px solid #8b5a2b;
    border-radius: 14px;

    box-shadow:
      0 0 30px rgba(0,0,0,0.8),
      0 0 10px rgba(139,90,43,0.5);

    position: relative;

    animation: glitch 3s infinite;
  }

  iframe {
    width: 900px;
    height: 650px;

    max-width: 97vw;
    max-height: 85vh;

    border: 2px solid #3b2a1d;
    border-radius: 8px;

    display: block;
    background: black;
  }

  .title {
    position: absolute;
    top: -38px;

    color: #d8c39a;
    font-size: 22px;
    letter-spacing: 2px;

    text-shadow: 0 0 8px rgba(0,0,0,0.8);
  }

  @keyframes glitch {
    0% { transform: translate(0); }
    2% { transform: translate(-2px, 1px); }
    4% { transform: translate(2px, -1px); }
    6% { transform: translate(0); }
    100% { transform: translate(0); }
  }

  /* 💀 ALERTA TIPO WINDOWS */
  .alert {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);

    background: #1e1e1e;
    color: #00ff66;

    padding: 15px 20px;
    border: 1px solid #00ff66;

    font-family: monospace;
    font-size: 14px;

    box-shadow: 0 0 15px rgba(0,255,100,0.5);

    z-index: 9999;

    opacity: 0;
    animation: showAlert 5s forwards;
  }

  @keyframes showAlert {
    0% { opacity: 0; transform: translate(-50%, -20px); }
    10% { opacity: 1; transform: translate(-50%, 0); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>

<body>

<div class="alert">
⚠ SYSTEM WARNING: MALWARE DETECTED IN NEWS DATABASE
</div>

<div class="game-box">

  <div class="title">
  algum virus tem infectado os computadores da cidade..
  </div>

  <iframe src="https://gravity-grove--leihdong.replit.app/"></iframe>

</div>

</body>
</html>
