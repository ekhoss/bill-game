<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Falls Search.com</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="logo">Falls Search</div>

<input type="text" class="search-box" id="pesquisa" placeholder="Pesquisar notícias em Gravity Falls...">
<br>
<button class="search-button" onclick="pesquisar()">Pesquisar</button>

<div class="results" id="resultados"></div>

<!-- GRADE DE NOTÍCIAS -->
<div class="grade-noticias">

<div class="caixa-noticia">
<a href="noticia1.html">
<img src="https://raw.githubusercontent.com/ekhoss/GRAVITY-FALLS-JORNAL/refs/heads/main/Noticia1piclado.jpeg"
<h3> Informante Do Noroeste </h3>
</a>
</div>

<div class="caixa-noticia">
<a href="noticia2.html">
<img src="https://raw.githubusercontent.com/ekhoss/GRAVITY-FALLS-JORNAL/refs/heads/main/Noticia2.jpeg">
<h3>Rede de computadores danificados da cidade.</h3>
</a>
</div>

<div class="caixa-noticia">
<a href="noticia3.html">
<img src="https://raw.githubusercontent.com/ekhoss/GRAVITY-FALLS-JORNAL/refs/heads/main/1000461268_polarr.jpeg">
<h3> Queridos leitores, confira os jogos da semana!</h3>
</a>
</div>

<div class="caixa-noticia">
<a href="noticia4.html">
<img src="https://raw.githubusercontent.com/ekhoss/GRAVITY-FALLS-JORNAL/refs/heads/main/1000459681_polarr.jpeg">
<h3> Domingo de amor. </h3>
</a>
</div>

</div>
<!-- FIM DA GRADE -->

</div>

<script>
function pesquisar() {
    var termo = document.getElementById("pesquisa").value;

    if (!termo) return;

    termo = termo.toLowerCase().trim();

    if (termo === "bill") {
        window.location.href = "bill.html";
        return;
    }

    var resultados = document.getElementById("resultados");
    resultados.innerHTML = "";

    if (termo.includes("noticias")) {
        resultados.innerHTML += '<br><a href="noticia1.html">Festival de Verão começa amanhã</a>';
        resultados.innerHTML += '<br><a href="noticia2.html">Criatura é vista no lago</a>';
        resultados.innerHTML += '<br><a href="noticia3.html">Nova estrada preocupa moradores</a>';
        resultados.innerHTML += '<br><a href="noticia4.html">Museu recebe artefato misterioso</a>';
    } else {
        resultados.innerHTML = "Nenhum resultado encontrado.";
    }
}

</script>
}


</script>
</body>
</html>
